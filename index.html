<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>hello.nori.tr</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 30%, #888);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      margin-top: 1rem;
      color: #666;
      font-size: 1rem;
      letter-spacing: 0.05em;
    }
    .dot { color: #e55; -webkit-text-fill-color: #e55; }
  </style>
</head>
<body>
  <div class="container">
    <h1>hello<span class="dot">.</span>nori<span class="dot">.</span>tr</h1>
    <p>yakında — coming soon</p>
  </div>
</body>
</html>
